apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: n8n-cluster
  region: ap-southeast-2
  version: "1.34"

# Use existing VPC
vpc:
  id: vpc-0b599ff538b98d5b6
  cidr: 10.119.16.0/20
  subnets:
    private:
      ap-southeast-2a:
        id: subnet-031bbf6584e97465a
        cidr: 10.119.20.0/24
      ap-southeast-2b:
        id: subnet-0cbdc7e5be8bf7aed
        cidr: 10.119.21.0/24
      ap-southeast-2c:
        id: subnet-0a01eb88aa05ac639
        cidr: 10.119.22.0/24

# IAM OIDC provider for service accounts
iam:
  withOIDC: true

# Managed node group
managedNodeGroups:
  - name: n8n-workers
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 2
    maxSize: 4
    privateNetworking: true
    volumeSize: 30
    volumeType: gp3
    labels:
      role: worker
      environment: npe
    tags:
      Environment: npe
      Project: n8n
      ManagedBy: eksctl

# CloudWatch logging
cloudWatch:
  clusterLogging:
    enableTypes: ["api", "audit", "authenticator", "controllerManager", "scheduler"]

# Add-ons
addons:
  - name: vpc-cni
    version: latest
  - name: coredns
    version: latest
  - name: kube-proxy
    version: latest
  - name: aws-ebs-csi-driver
    version: latest
    wellKnownPolicies:
      ebsCSIController: true
