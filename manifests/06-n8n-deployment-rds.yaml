apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: n8n
  labels:
    app: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: n8n
        image: 993676232205.dkr.ecr.ap-southeast-2.amazonaws.com/twe-container-dockerhub/n8nio/n8n:2.11.0
        ports:
        - containerPort: 5678
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
        env:
        - name: N8N_SECURE_COOKIE
          value: "false"
        - name: N8N_PROTOCOL
          value: http
        - name: N8N_PORT
          value: "5678"
        - name: N8N_METRICS
          value: "true"
        - name: N8N_DIAGNOSTICS_ENABLED
          value: "true"
        - name: N8N_VERSION_NOTIFICATIONS_ENABLED
          value: "true"
        - name: N8N_PERSONALIZATION_ENABLED
          value: "false"
        - name: HTTP_PROXY
          value: "http://10.122.108.59:8080"
        - name: HTTPS_PROXY
          value: "http://10.122.108.59:8080"
        - name: NO_PROXY
          value: "localhost,127.0.0.1,169.254.169.254,.internal,.svc,.svc.cluster.local,10.119.16.0/20,.amazonaws.com"
        - name: DB_TYPE
          value: postgresdb
        - name: DB_POSTGRESDB_HOST
          valueFrom:
            secretKeyRef:
              name: n8n-postgres-rds
              key: host
        - name: DB_POSTGRESDB_PORT
          valueFrom:
            secretKeyRef:
              name: n8n-postgres-rds
              key: port
        - name: DB_POSTGRESDB_DATABASE
          valueFrom:
            secretKeyRef:
              name: n8n-postgres-rds
              key: database
        - name: DB_POSTGRESDB_USER
          valueFrom:
            secretKeyRef:
              name: n8n-postgres-rds
              key: username
        - name: DB_POSTGRESDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: n8n-postgres-rds
              key: password
        - name: DB_POSTGRESDB_SSL_ENABLED
          value: "true"
        - name: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
          value: "false"
        # Initial owner account (optional - remove after first setup)
        - name: N8N_OWNER_EMAIL
          valueFrom:
            secretKeyRef:
              name: n8n-owner-credentials
              key: email
              optional: true
        - name: N8N_OWNER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: n8n-owner-credentials
              key: password
              optional: true
        - name: N8N_OWNER_FIRST_NAME
          valueFrom:
            secretKeyRef:
              name: n8n-owner-credentials
              key: first_name
              optional: true
        - name: N8N_OWNER_LAST_NAME
          valueFrom:
            secretKeyRef:
              name: n8n-owner-credentials
              key: last_name
              optional: true
        volumeMounts:
        - name: n8n-storage
          mountPath: /home/node/.n8n
        - name: tmp
          mountPath: /tmp
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 5678
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: 5678
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: n8n-storage
        persistentVolumeClaim:
          claimName: n8n-pvc
      - name: tmp
        emptyDir: {}
